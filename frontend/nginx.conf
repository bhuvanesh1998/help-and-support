server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Runtime config + app shell must never be cached — they change per deploy.
    location = /app-config.json {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Hashed build assets are content-addressed → cache aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unmatched route serves the Angular shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
